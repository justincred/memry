name: E2E Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  ELECTRON_DISABLE_SANDBOX: 1

jobs:
  e2e:
    name: Playwright Electron E2E (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11
          npx playwright install-deps chromium

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app for E2E
        run: pnpm build

      - name: Run Electron E2E tests (shard ${{ matrix.shard }})
        env:
          # Google Calendar E2E credentials — gated on the secrets being
          # configured at the repo level. Empty strings when unset cause the
          # Calendar suites' `CREDS_PRESENT` check to fail and the tests skip
          # cleanly, so forks without access still pass CI.
          GOOGLE_CALENDAR_E2E: '1'
          GOOGLE_CALENDAR_E2E_REFRESH_TOKEN: ${{ secrets.GOOGLE_CALENDAR_E2E_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_E2E_CLIENT_ID: ${{ secrets.GOOGLE_CALENDAR_E2E_CLIENT_ID }}
          GOOGLE_CALENDAR_E2E_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_E2E_CLIENT_SECRET }}
        run: |
          # keytar -> libsecret needs an active dbus session + an unlocked
          # gnome-keyring with the default "login" collection present.
          # Two-stage init (unlock then start) is required: --unlock creates
          # the login keyring with the supplied password, --start spawns the
          # daemon and exports the socket env vars. Otherwise libsecret errors
          # with 'transport "disabled"' or 'collection/login does not exist'.
          dbus-run-session -- bash -c '
            eval "$(printf "\n" | gnome-keyring-daemon --unlock)"
            eval "$(printf "\n" | gnome-keyring-daemon --start --components=secrets)"
            xvfb-run -a pnpm test:e2e --shard=${{ matrix.shard }}
          '

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ strategy.job-index }}
          path: apps/desktop/test-results/
          if-no-files-found: ignore
