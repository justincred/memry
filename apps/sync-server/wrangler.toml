name = "memry-sync-server"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
ENVIRONMENT = "development"
MIN_APP_VERSION = "0.1.0"

[[d1_databases]]
binding = "DB"
database_name = "memry-sync"
database_id = "TODO-create-d1-database"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "memry-encrypted-blobs-staging"

[durable_objects]
bindings = [
  { name = "USER_SYNC_STATE", class_name = "UserSyncState" },
  { name = "LINKING_SESSION", class_name = "LinkingSession" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserSyncState", "LinkingSession"]

[triggers]
crons = ["0 */6 * * *"]

[env.staging]
name = "memry-sync-server-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGIN = ""       # Desktop only
MIN_APP_VERSION = "0.1.0"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "memry-sync-staging"
database_id = "0b7c7894-925e-4a12-a0bc-02ea4081a5c7"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "memry-encrypted-blobs-staging"

[env.staging.durable_objects]
bindings = [
  { name = "USER_SYNC_STATE", class_name = "UserSyncState" },
  { name = "LINKING_SESSION", class_name = "LinkingSession" },
]

[env.production]
name = "memry-sync-server-production"
[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "TODO-production-origin"
MIN_APP_VERSION = "0.1.0"

[[env.production.d1_databases]]
binding = "DB"
database_name = "memry-sync-production"
database_id = "TODO-create-d1-database-production"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "memry-encrypted-blobs-production"

[env.production.durable_objects]
bindings = [
  { name = "USER_SYNC_STATE", class_name = "UserSyncState" },
  { name = "LINKING_SESSION", class_name = "LinkingSession" },
]
